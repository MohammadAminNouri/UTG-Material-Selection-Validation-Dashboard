name: Streamlit Validation Check

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  streamlit-check:
    name: Check UTG Streamlit Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check Python files compile
        run: |
          python -m compileall .

      - name: Check data files exist
        run: |
          test -f data/candidate_materials.csv
          test -f data/weighted_matrix_report_scores.csv
          test -f data/validation_plan.csv
          test -f data/eco_audit_baseline.csv

      - name: Check main Streamlit app exists
        run: |
          test -f app.py

      - name: Run Streamlit smoke test
        run: |
          streamlit run app.py --server.headless true --server.port 8501 &
          sleep 15
          curl --fail http://localhost:8501
